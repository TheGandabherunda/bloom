[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  # Use Node.js 20 and ESM (your project uses "type": "module")
  node_bundler = "esbuild"

# Playlist fetches can be slow for large playlists — give it max time
[functions."audio-playlist"]
  timeout = 26


# Redirect /api/audio/search → function
[[redirects]]
  from = "/api/audio/search"
  to = "/.netlify/functions/audio-search"
  status = 200

# Redirect /api/audio/recommend → function
[[redirects]]
  from = "/api/audio/recommend"
  to = "/.netlify/functions/audio-recommend"
  status = 200

# Redirect /api/audio/stream/:id → function with id as query param
[[redirects]]
  from = "/api/audio/stream/:id"
  to = "/.netlify/functions/audio-stream?id=:id"
  status = 200

# Redirect /api/audio/image → function
[[redirects]]
  from = "api/yt/image"
  to = "/.netlify/functions/audio-image"
  status = 200

# Redirect /api/audio/playlist → function
[[redirects]]
  from = "/api/audio/playlist"
  to = "/.netlify/functions/audio-playlist"
  status = 200

# Redirect /api/audio/resolve → function
[[redirects]]
  from = "/api/audio/resolve"
  to = "/.netlify/functions/audio-resolve"
  status = 200

# Redirect /api/lyrics → function
[[redirects]]
  from = "/api/lyrics"
  to = "/.netlify/functions/lyrics"
  status = 200

# SPA fallback — all other routes serve index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
