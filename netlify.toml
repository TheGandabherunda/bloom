[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  # Use Node.js 20 and ESM (your project uses "type": "module")
  node_bundler = "esbuild"

# Playlist fetches can be slow for large playlists — give it max time
[functions."yt-playlist"]
  timeout = 26


# Redirect /api/yt/search → function
[[redirects]]
  from = "/api/yt/search"
  to = "/.netlify/functions/yt-search"
  status = 200

# Redirect /api/yt/recommend → function
[[redirects]]
  from = "/api/yt/recommend"
  to = "/.netlify/functions/yt-recommend"
  status = 200

# Redirect /api/yt/stream/:id → function with id as query param
[[redirects]]
  from = "/api/yt/stream/:id"
  to = "/.netlify/functions/yt-stream?id=:id"
  status = 200

# Redirect /api/yt/image → function
[[redirects]]
  from = "api/yt/image"
  to = "/.netlify/functions/yt-image"
  status = 200

# Redirect /api/yt/playlist → function
[[redirects]]
  from = "/api/yt/playlist"
  to = "/.netlify/functions/yt-playlist"
  status = 200

# Redirect /api/lyrics → function
[[redirects]]
  from = "/api/lyrics"
  to = "/.netlify/functions/lyrics"
  status = 200

# SPA fallback — all other routes serve index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
